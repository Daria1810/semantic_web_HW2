spring.application.name=hw2-book-recommender
server.port=8080

# Pull in an optional local-only properties file for secrets (gitignored).
spring.config.import=optional:file:./application-local.properties,optional:classpath:application-local.properties

# Where the RDF book data lives on the classpath
app.rdf.books-path=classpath:data/books.rdf

# Gemini config — real key goes in application-local.properties (gitignored) or env var
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.chat-model=gemini-2.5-flash
app.gemini.embedding-model=gemini-embedding-001

spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
