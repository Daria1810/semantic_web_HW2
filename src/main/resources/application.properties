spring.application.name=hw2-book-recommender
server.port=8080

# Where the RDF book data lives on the classpath
app.rdf.books-path=classpath:data/books.rdf

# Gemini config — real key goes in application-local.properties (gitignored)
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.chat-model=gemini-2.0-flash
app.gemini.embedding-model=text-embedding-004

spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
